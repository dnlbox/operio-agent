# ==============================================================================
# Cloud Run Deployment Workflow
# ==============================================================================
# Required GitHub repository secrets:
#   GCP_WIF_PROVIDER  — Workload Identity Federation provider resource string
#                       e.g. projects/178805676563/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   GCP_SA_EMAIL      — Service account email that the WIF identity impersonates
#                       e.g. operio-vm-sa@<PROJECT_ID>.iam.gserviceaccount.com
# ==============================================================================

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy to Cloud Run
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          ARIZE_SPACE_ID: ${{ secrets.ARIZE_SPACE_ID }}
          MIN_INSTANCES: 1
          CPU_BOOST: "true"
        run: |
          chmod +x ./scripts/deploy.sh
          ./scripts/deploy.sh

