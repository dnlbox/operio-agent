version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: operio-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: operio-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: operio-phoenix
    ports:
      - "6006:6006"
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  elasticsearch_data:
    driver: local
